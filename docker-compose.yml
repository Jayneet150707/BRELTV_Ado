version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=BRELTV;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    networks:
      - breltv-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    volumes:
      - sqldata:/var/opt/mssql
      - ./src/Database:/docker-entrypoint-initdb.d
    networks:
      - breltv-network

networks:
  breltv-network:
    driver: bridge

volumes:
  sqldata:

