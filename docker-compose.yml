version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=BRELTV;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    networks:
      - breltv-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    volumes:
      - breltv-data:/var/opt/mssql
    networks:
      - breltv-network

networks:
  breltv-network:
    driver: bridge

volumes:
  breltv-data:

